<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Luxe | Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body>
    <header class="site-header glass">
      <a class="logo" href="/index.html">Travel Luxe</a>
      <nav>
        <a href="/packages.html">Packages</a>
        <a href="/contact.html" aria-current="page">Contact</a>
      </nav>
    </header>

    <main class="page-body section-fade two-col">
      <section class="panel">
        <p class="eyebrow">Get In Touch</p>
        <h1>Contact Travel Luxe</h1>
        <p>Phone: +91 99999 99999</p>
        <p>Email: support@travelluxe.example</p>
        <p>Address: Skyline Business Hub, Mumbai, India</p>
      </section>
      <section class="panel">
        <h2>Book or Enquire</h2>
        <form class="inquiry-form">
          <label>
            Name
            <input type="text" name="name" required />
          </label>
          <label>
            Email
            <input type="email" name="email" required />
          </label>
          <label>
            Phone
            <input type="tel" name="phone" required />
          </label>
          <label>
            Message
            <textarea name="message" rows="4" required></textarea>
          </label>
          <button type="submit" class="btn-primary">Send Inquiry</button>
        </form>
      </section>
    </main>

    <a
      class="whatsapp-float"
      href="https://wa.me/919999999999?text=Hi%2C%20I%27d%20like%20to%20contact%20your%20travel%20team."
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Chat on WhatsApp"
      >💬</a
    >

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
